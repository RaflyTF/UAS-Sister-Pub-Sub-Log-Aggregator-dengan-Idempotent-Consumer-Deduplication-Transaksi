# docker-compose.yml
# ──────────────────────────────────────────────────────────────────────────
# Pub-Sub Log Aggregator — UAS Sistem Terdistribusi
#
# Tiga service:
#   broker      → Redis 7-alpine  (message broker, Streams + consumer groups)
#   aggregator  → FastAPI + SQLite (API + consumer workers + dedup)
#   publisher   → Python script   (event generator + simulator duplikasi)
#
# Dua named volume:
#   broker_data     → Redis AOF persistence (appendonly yes)
#   aggregator_data → SQLite .db file persistence
#
# SEMUA traffic dalam network 'internal' — tidak ada dependency ke layanan
# eksternal publik (sesuai ketentuan UAS).
# ──────────────────────────────────────────────────────────────────────────

services:

  # ── Redis Broker ─────────────────────────────────────────────────────────
  broker:
    image: redis:7-alpine
    container_name: uas-broker
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy noeviction
    volumes:
      - broker_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Aggregator (FastAPI + Consumer Workers + SQLite) ──────────────────────
  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    image: uas-aggregator:latest
    container_name: uas-aggregator
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
    environment:
      - BROKER_URL=redis://broker:6379
      - DATABASE_PATH=/var/lib/aggregator/events.db
      - NUM_WORKERS=3
      - LOG_LEVEL=INFO
      - TESTING=false
    ports:
      - "8080:8080"       # Expose ke host untuk demo lokal
    volumes:
      - aggregator_data:/var/lib/aggregator
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Publisher (Event Generator) ───────────────────────────────────────────
  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    image: uas-publisher:latest
    container_name: uas-publisher
    restart: "no"          # Jalankan sekali lalu selesai
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      - TARGET_URL=http://aggregator:8080/publish
      - EVENTS_TOTAL=25000
      - DUPLICATE_RATE=0.35
      - BATCH_SIZE=50
      - LOG_LEVEL=INFO
    networks:
      - internal

# ── Named Volumes (data persisten meski container dihapus) ───────────────
volumes:
  broker_data:
    name: uas_broker_data
  aggregator_data:
    name: uas_aggregator_data

# ── Internal Network (isolasi jaringan Compose) ───────────────────────────
networks:
  internal:
    driver: bridge
    name: uas_internal_network
